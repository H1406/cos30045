<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Data Visualisation</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>Energy Consumption of TVs</h1>

<section>
<h2>Energy Consumption vs Star Rating</h2>
<p>Scatter plot showing relationship between efficiency rating and energy usage.</p>
<div id="scatter-chart"></div>
</section>

<section>
<h2>Energy Consumption by Screen Technology</h2>
<div id="donut-chart"></div>
</section>

<section>
<h2>Energy Consumption for 55 inch TVs</h2>
<div id="bar-chart"></div>
</section>

<section>
<h2>Electricity Spot Prices (1998–2024)</h2>
<div id="line-chart"></div>
</section>

<script src="js/scatter.js"></script>
<script src="js/donut.js"></script>
<script src="js/bar.js"></script>
<script src="js/line.js"></script>

</body>
</html>
